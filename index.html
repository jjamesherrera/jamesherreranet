    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        
        :root {
            --accent-gold: #D4AF37;
            --accent-gold-hover: #b5952f;
            --dark-bg: #111111;
            --light-bg: #FAFAFA;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: #333;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Sleek Nav Glass Effect */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Hero Image with sophisticated overlay */
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(17, 17, 17, 0.7), rgba(17, 17, 17, 0.9)), 
                        url('https://i.postimg.cc/0Qx7kRC7/Whats-App-Image-2025-04-07-at-08-26-05.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Parallax effect */
            height: 100vh;
            min-height: 800px;
        }

        /* Buttons Premium */
        .btn-premium {
            background-color: var(--accent-gold);
            color: #fff !important;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .btn-premium::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: var(--dark-bg);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: -1;
        }

        .btn-premium:hover::after {
            height: 100%;
        }

        .btn-outline-premium {
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            transition: all 0.4s ease;
        }

        .btn-outline-premium:hover {
            border-color: var(--accent-gold);
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
        }

        /* Elegant Underline Hover for Nav */
        .nav-link {
            position: relative;
            color: #111;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-gold);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }

        /* Service Cards */
        .service-card {
            background: #fff;
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.4s ease;
        }
        
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            border-color: rgba(212, 175, 55, 0.3);
        }

        /* Section Dividers */
        .section-divider {
            width: 60px;
            height: 2px;
            background-color: var(--accent-gold);
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Gallery slick hover */
        .gallery-item {
            overflow: hidden;
            border-radius: 4px;
            position: relative;
        }
        
        .gallery-item img {
            transition: transform 0.7s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.08);
        }
        
        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        /* Testimonial Quote */
        .testimonial-card {
            background: #fff;
            border-left: 4px solid var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        /* Client Logos */
        .client-logo {
            filter: grayscale(100%) opacity(0.5);
            transition: all 0.4s ease;
        }
        
        .client-logo:hover {
            filter: grayscale(0%) opacity(1);
            transform: translateY(-5px);
        }
    </style>

</head>
